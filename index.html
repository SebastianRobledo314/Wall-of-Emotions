<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Canvas</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/dist/face-api.min.js"></script>
</head>
<body>

  <!-- Hidden video feed -->
  <video id="video" autoplay muted playsinline></video>

  <!-- Background music -->
  <audio id="bg-music" loop preload="auto">
    <source src="Short Meditation Music - 3 Minute Relaxation, Calming.mp3" type="audio/mpeg" />
  </audio>

  <!-- Eraser (crumple) sound effect -->
  <audio id="erase-sfx" loop preload="auto">
    <source src="crumples.mp3" type="audio/mpeg" />
  </audio>

  <!-- Undo (eraser) sound effect -->
  <audio id="undo-sfx" loop preload="auto">
    <source src="Eraser Sound Effects [Free Audio].mp3" type="audio/mpeg" />
  </audio>

  <!-- Poof sound effect (played when erase/undo completes) -->
  <audio id="poof-sfx" preload="auto">
    <source src="poof.mp3" type="audio/mpeg" />
  </audio>

  <!-- Layer 1: animated rainbow background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Layer 2: persistent glow trail -->
  <canvas id="trail-canvas"></canvas>

  <!-- Layer 3: erase progress overlay -->
  <canvas id="erase-canvas"></canvas>

  <!-- Hand preview (top-left) -->
  <canvas id="hand-preview"></canvas>

  <!-- Face tracking ring -->
  <div id="face-ring"></div>

  <!-- ─── Status Overlay (auto-dismisses, no button) ─── -->
  <div id="status-overlay">
    <div class="status-inner">
      <h1 class="load-title">Emotion<br />Canvas</h1>
      <p class="load-subtitle">Interactive Art </p>
      <div class="load-bar-wrap">
        <div id="loading-bar"></div>
      </div>
      <p id="loading-status">Initializing…</p>
      <p id="error-msg"></p>
    </div>
  </div>

  <!-- ─── HUD Top Left ─── -->
  <div id="hud-top">
    <p class="hud-label">Interactive Installation</p>
    <h2 class="hud-title">Emotion Canvas</h2>
  </div>

  <!-- ─── HUD Bottom Left – Emotion ─── -->
  <div id="hud-emotion">
    <div id="emotion-dot"></div>
    <span id="emotion-name"></span>
  </div>

  <!-- ─── HUD Bottom Right – Legend ─── -->
  <div id="hud-legend">
    <div class="leg" id="leg-happy">
      <span>Happy</span><div class="leg-dot" style="background:#FFD700;"></div>
    </div>
    <div class="leg" id="leg-sad">
      <span>Sad</span><div class="leg-dot" style="background:#4169FF;"></div>
    </div>
    <div class="leg" id="leg-angry">
      <span>Angry</span><div class="leg-dot" style="background:#FF2828;"></div>
    </div>
    <div class="leg" id="leg-surprised">
      <span>Surprised</span><div class="leg-dot" style="background:#1ED250;"></div>
    </div>
    <div class="leg" id="leg-neutral">
      <span>Neutral</span><div class="leg-dot" style="background:#ccc;"></div>
    </div>
    <div class="leg-divider"></div>
    <div class="leg" id="leg-undo">
      <span>Undo (T)</span><div class="leg-dot" style="background:#ffffff;"></div>
    </div>
    <div class="leg" id="leg-erase">
      <span>Erase (O)</span><div class="leg-dot" style="background:linear-gradient(90deg,#ffffff,#ff1e1e);"></div>
    </div>
    <div class="leg" id="leg-snap">
      <span>Screenshot (L+L)</span><div class="leg-dot" style="background:linear-gradient(90deg,#ffffff,#FFDC00);"></div>
    </div>
  </div>

  <!-- ─── Hand-over-face Warning ─── -->
  <div id="hand-warning">
    <img src="warning.png" alt="Warning" />
    <p>Please remove your hand from your face</p>
  </div>

  <!-- ─── Center Title ─── -->
  <div id="instructions">
    <p>Draw with your finger and express your emotions</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
